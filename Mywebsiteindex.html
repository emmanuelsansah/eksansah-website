<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EK SANSAH COMPANY LTD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
        }
        
        nav {
            background-color: #444;
            padding: 0.5rem;
            text-align: center;
        }
        
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
        }
        
        main {
            padding: 2rem;
        }
        
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .product {
            background: white;
            border: 1px solid #ddd;
            padding: 1rem;
            width: 200px;
            text-align: center;
        }
        
        .product button {
            background: #28a745;
            color: white;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
        }
        
        .cart {
            background: white;
            border: 1px solid #ddd;
            padding: 1rem;
            margin-top: 2rem;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        form {
            background: white;
            border: 1px solid #ddd;
            padding: 1rem;
            margin-top: 2rem;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }
        
        button[type="submit"] {
            background: #ff006a;
            color: rgb(113, 64, 148);
            border: none;
            padding: 0.5rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <h1>EK SANSAH COMPANY LTD</h1>
        <p>Welcome to our online store</p>
    </header>
    <nav>
        <a href="#products">Products</a>
        <a href="#cart">Cart</a>
        <a href="#order">Place Order</a>
    </nav>
    <main>
        <section id="products">
            <h2>Our Products</h2>
            <div class="products">
                <div class="product">
                    <h3>iphone 8</h3>
                    <p>Description of iphone 8</p>
                    <p>GHC10.00</p>
                    <button onclick="addToCart('iphone 8', 10)">Add to Cart</button>
                </div>
                <div class="product">
                    <h3> iphone 13</h3>
                    <p>Description of iphone 13</p>
                    <p>GHC15.00</p>
                    <button onclick="addToCart(' iphone 13', 15)">Add to Cart</button>
                </div>
                <div class="product">
                    <h3>iphone 12</h3>
                    <p>Description of iphone 12</p>
                    <p>GHC20.00</p>
                    <button onclick="addToCart('iphone 12', 20)">Add to Cart</button>
                </div>
            </div>
        </section>
        <section id="cart" class="cart">
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <p>Total: GHC<span id="total">0.00</span></p>
        </section>
        <section id="order">
            <h2>Place Your Order</h2>
            <form id="order-form" onsubmit="placeOrder(event)">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <label for="address">Address:</label>
                <textarea id="address" required></textarea>
                <button type="submit">Submit Order</button>
            </form>
        </section>
    </main>
    <script>
        let cart = [];
        let total = 0;

        function addToCart(product, price) {
            cart.push({
                product,
                price
            });
            total += price;
            updateCart();
        }

        function updateCart() {
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>${item.product}</span><span>$${item.price}</span>`;
                cartItems.appendChild(div);
            });
            document.getElementById('total').textContent = total.toFixed(2);
        }

        function placeOrder(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            alert(`Order placed!\nName: ${name}\nEmail: ${email}\nAddress: ${address}\nTotal: $${total}\nItems: ${cart.map(item => item.product).join(', ')}`);
            // In a real app, send to server
            cart = [];
            total = 0;
            updateCart();
            document.getElementById('order-form').reset();
        }
    </script>
</body>

</html>
